spring.application.name=brio-helpdesk

spring.profiles.active=prod

spring.jpa.hibernate.ddl-auto=update
  
  # Database Configuration (PostgreSQL/Neon)

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
  
  # H2 Console (for local testing)

spring.h2.console.enabled=true
  
  # OpenAI Config

spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
#spring.ai.openai.embedding.model=text-embedding-3-small
  
  # Vector DB Config (pgvector)

spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=hnsw
spring.ai.vectorstore.pgvector.enabled=true
  
  # MCP Config

spring.ai.mcp.client.enabled=false
spring.ai.mcp.client.stdio.connections.github.command=mcp-server-github
spring.ai.mcp.client.stdio.connections.github.env.GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PAT}
spring.ai.mcp.client.toolcallback.enabled=false
spring.ai.mcp.client.request-timeout=30s

# ollama config
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.model=nomic-embed-text
spring.ai.ollama.chat.enabled=false
spring.ai.model.chat=openai

#docker
spring.docker.compose.enabled=false


  # Logging

logging.level.root=INFO
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
logging.level.org.springframework.ai.vectorstore=DEBUG
  
  # Server

server.port=${PORT:8080}
